name: Deploy to GoDaddy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3
        with:
          server: ${{ secrets.GODADDY_SERVER }}
          username: ${{ secrets.GODADDY_USERNAME }}
          password: ${{ secrets.GODADDY_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.GODADDY_SERVER_DIR }}
          git-depth: 0
